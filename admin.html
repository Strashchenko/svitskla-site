<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Адмінка · Світскла Сервіс</title>
<style>
  :root{--ink:#0C0E12;--azure:#3A80D2;--aqua:#15C9EA;--soft:#EAF3F8;--border:#D9E2EA;--muted:#6C7886}
  *{box-sizing:border-box}
  body{margin:0;font-family:Manrope,system-ui,Arial,sans-serif;background:var(--soft);color:var(--ink)}
  header.bar{background:var(--ink);color:#fff;padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
  header.bar b{font-size:1.05rem}
  .wrap{max-width:880px;margin:0 auto;padding:1.25rem}
  .card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
  label{display:block;font-weight:700;font-size:.9rem;margin:.9rem 0 .35rem}
  input,textarea,select{width:100%;padding:.7rem .8rem;border:1px solid var(--border);border-radius:9px;font-family:inherit;font-size:.95rem;background:#fff}
  textarea{min-height:70px;resize:vertical}
  button{cursor:pointer;border:none;border-radius:9px;font-family:inherit;font-weight:700;font-size:.95rem;padding:.7rem 1.1rem;background:var(--azure);color:#fff}
  button.ghost{background:#fff;color:var(--ink);border:1px solid var(--border)}
  button.sm{padding:.35rem .6rem;font-size:.8rem}
  button.danger{background:#e23b3b}
  .tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}
  .tabs button{background:#fff;color:var(--ink);border:1px solid var(--border)}
  .tabs button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .group-title{font-family:"IBM Plex Mono",monospace;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--azure);margin:.4rem 0 0}
  .hint{color:var(--muted);font-size:.82rem;margin-top:.3rem}
  .status{font-size:.85rem;color:#1a9e4b;height:1.1em;margin-top:.3rem}
  .row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
  .media-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.9rem;margin-top:1rem}
  .media-item{border:1px solid var(--border);border-radius:9px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
  .media-item img{width:100%;aspect-ratio:9/16;object-fit:cover;background:#0C0E12}
  .media-item .mi-body{padding:.5rem;font-size:.8rem;color:var(--muted);display:flex;flex-direction:column;gap:.4rem}
  .media-item .mi-actions{display:flex;gap:.3rem;flex-wrap:wrap}
  .vidtag{display:inline-block;background:var(--ink);color:#fff;font-size:.7rem;padding:.15rem .4rem;border-radius:4px}
  #login{max-width:380px;margin:8vh auto;padding:1.5rem}
  #app{display:none}
  .err{color:#e23b3b;font-size:.85rem;margin-top:.5rem}
  .saveall{position:sticky;bottom:0;background:var(--soft);padding:.8rem 0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h2 style="margin-top:0">Вхід в адмінку</h2>
  <label>Email</label>
  <input id="email" type="email" autocomplete="username" placeholder="admin@svitskla.com.ua">
  <label>Пароль</label>
  <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
  <div style="margin-top:1rem"><button id="loginBtn">Увійти</button></div>
  <div id="loginErr" class="err"></div>
</div>

<!-- APP -->
<div id="app">
  <header class="bar">
    <b>Адмінка · Світскла Сервіс</b>
    <div class="row">
      <a href="index.html" target="_blank" rel="noopener"><button class="ghost sm">Відкрити сайт ↗</button></a>
      <button id="logoutBtn" class="ghost sm">Вийти</button>
    </div>
  </header>
  <div class="wrap">
    <div class="tabs">
      <button data-tab="texts" class="active">Тексти</button>
      <button data-tab="media">Фото та відео</button>
      <button data-tab="leads">Заявки</button>
      <button data-tab="pass">Пароль</button>
    </div>

    <div id="tab-texts">
      <div id="fields"></div>
      <div class="saveall"><button id="saveAll">Зберегти всі тексти</button> <span id="textsStatus" class="status"></span></div>
    </div>

    <div id="tab-media" style="display:none">
      <div class="card">
        <label>Оберіть місце на сайті</label>
        <select id="sectionSel"></select>
        <div id="addArea" style="margin-top:1rem"></div>
        <div id="mediaStatus" class="status"></div>
      </div>
      <div id="mediaList" class="media-list"></div>
    </div>

    <div id="tab-leads" style="display:none">
      <div class="card">
        <div class="row" style="justify-content:space-between">
          <h3 style="margin:0">Заявки з форми</h3>
          <button id="exportLeads">Експорт в Excel</button>
        </div>
        <div id="leadsStatus" class="status"></div>
        <div id="leadsList" style="margin-top:1rem;overflow-x:auto"></div>
      </div>
    </div>

    <div id="tab-pass" style="display:none">
      <div class="card">
        <h3 style="margin-top:0">Змінити пароль</h3>
        <label>Новий пароль (мін. 6 символів)</label>
        <input id="newPass" type="password" placeholder="новий пароль">
        <div style="margin-top:1rem"><button id="changePass">Зберегти пароль</button> <span id="passStatus" class="status"></span></div>
      </div>
    </div>
  </div>
</div>

const $ = function(s){return document.querySelector(s);};

/* ---------- AUTH ---------- */
async function init(){
  const { data } = await sb.auth.getSession();
  if(data.session){ setDb(data.session.access_token); showApp(); } else { $('#login').style.display='block'; $('#app').style.display='none'; }
}
$('#loginBtn').onclick = async function(){
  $('#loginErr').textContent='';
  const { data, error } = await sb.auth.signInWithPassword({ email:$('#email').value.trim(), password:$('#password').value });
  if(error){ $('#loginErr').textContent='Невірний email або пароль.'; return; }
  setDb(data.session.access_token);
  showApp();
};
$('#password').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#loginBtn').click(); });
$('#logoutBtn').onclick = async function(){ await sb.auth.signOut(); location.reload(); };

function showApp(){
  $('#login').style.display='none'; $('#app').style.display='block';
  buildFields(); loadTexts(); buildSectionSel();
}

/* ---------- TABS ---------- */
document.querySelectorAll('.tabs button').forEach(b=>{
  b.onclick=function(){
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    $('#tab-texts').style.display = b.dataset.tab==='texts'?'block':'none';
    $('#tab-media').style.display = b.dataset.tab==='media'?'block':'none';
    $('#tab-leads').style.display = b.dataset.tab==='leads'?'block':'none';
    $('#tab-pass').style.display  = b.dataset.tab==='pass'?'block':'none';
    if(b.dataset.tab==='leads') loadLeads();
  };
});

/* ---------- TEXTS ---------- */
function buildFields(){
  const box=$('#fields'); box.innerHTML='';
  let card=null;
  FIELDS.forEach(f=>{
    if(f.g){ card=document.createElement('div'); card.className='card';
      const t=document.createElement('div'); t.className='group-title'; t.textContent=f.g; card.appendChild(t); box.appendChild(card); return; }
    const lab=document.createElement('label'); lab.textContent=f.l; card.appendChild(lab);
    const el=document.createElement(f.t?'textarea':'input'); el.id='f_'+f.k; el.dataset.key=f.k; card.appendChild(el);
    if(f.hint){ const h=document.createElement('div'); h.className='hint'; h.textContent=f.hint; card.appendChild(h); }
  });
}
async function loadTexts(){
  const { data } = await db.from('site_content').select('key,value');
  const map={}; (data||[]).forEach(r=>map[r.key]=r.value);
  FIELDS.forEach(f=>{ if(f.k){ const el=$('#f_'+f.k); if(el) el.value = map[f.k]!=null?map[f.k]:''; } });
}
$('#saveAll').onclick = async function(){
  $('#textsStatus').textContent='Збереження…';
  const rows = FIELDS.filter(f=>f.k).map(f=>({ key:f.k, value:$('#f_'+f.k).value, updated_at:new Date().toISOString() }));
  const { error } = await db.from('site_content').upsert(rows, { onConflict:'key' });
  $('#textsStatus').textContent = error? ('Помилка: '+error.message) : 'Збережено ✓';
  setTimeout(()=>{$('#textsStatus').textContent='';},2500);
};

/* ---------- MEDIA ---------- */
function buildSectionSel(){
  const sel=$('#sectionSel'); sel.innerHTML='';
  SECTIONS.forEach(s=>{ const o=document.createElement('option'); o.value=s.id; o.textContent=s.l; sel.appendChild(o); });
  sel.onchange=renderMedia; renderMedia();
}
function curSection(){ return SECTIONS.find(s=>s.id===$('#sectionSel').value); }

function renderAddArea(){
  const s=curSection(); const area=$('#addArea'); area.innerHTML='';
  if(s.kind==='works'){
    area.innerHTML =
      '<label>Слот</label><select id="slotSel"><option value="tiktok">TikTok</option><option value="instagram">Instagram</option></select>'+
      '<label>Коротке відео (mp4) — програватиметься без звуку, по колу</label><input id="vidFile" type="file" accept="video/*">'+
      '<label>Посилання, куди веде клік (TikTok / Instagram)</label><input id="vidLink" placeholder="https://...">'+
      '<label>Підпис кнопки</label><input id="vidCap" placeholder="Дивитись у TikTok">'+
      '<div style="margin-top:.8rem"><button id="addWorks">Зберегти відео</button></div>'+
      '<div class="hint">Порада: вертикальне відео (9:16), до ~15 секунд.</div>';
    $('#addWorks').onclick=addWorks;
  } else if(s.kind==='single'){
    const acc = s.videoOnly ? 'video/*' : (s.imageOnly ? 'image/*' : 'image/*,video/*');
    const note = s.videoOnly ? 'Тільки відео (9:16, до ~15 сек). Гратиме без звуку, по колу.'
      : (s.imageOnly ? 'Тільки фото (порівняння до/після).' : 'Можна фото або коротке відео (9:16, до ~15 сек). Відео гратиме без звуку, по колу.');
    area.innerHTML =
      '<label>Місце (слот)</label><select id="slotSel">'+
        s.slots.map(x=>'<option value="'+x[0]+'">'+x[1]+'</option>').join('')+'</select>'+
      '<label>Файл</label><input id="slotFile" type="file" accept="'+acc+'">'+
      '<div style="margin-top:.8rem"><button id="addSingle">Зберегти у слот</button></div>'+
      '<div class="hint">'+note+' Нове завантаження замінює попереднє у цьому слоті.</div>';
    $('#addSingle').onclick=addSingle;
  } else {
    let subHtml='';
    if(s.subs && s.subs.length){
      subHtml='<label>Підкатегорія (фільтр)</label><select id="subSel"><option value="">— без підкатегорії —</option>'+
        s.subs.map(x=>'<option value="'+x[0]+'">'+x[1]+'</option>').join('')+'</select>';
    }
    area.innerHTML = subHtml +
      '<label>Фото (можна кілька)</label><input id="photoInput" type="file" accept="image/*" multiple>'+
      '<div style="margin-top:.8rem"><button id="addPhoto">Завантажити фото</button></div>';
    $('#addPhoto').onclick=addPhotos;
  }
}

async function renderMedia(){
  renderAddArea();
  const s=curSection(); const list=$('#mediaList'); list.innerHTML='Завантаження…';
  const { data } = await db.from('gallery').select('*').eq('section', s.id).order('position',{ascending:false});
  list.innerHTML='';
  if(s.kind==='single'){ renderSingleSlots(s, data||[], list); return; }
  if(!data || !data.length){ list.innerHTML='<div class="hint">Поки що порожньо. Додайте фото або відео вище.</div>'; return; }
  data.forEach((it,i)=>{
    const d=document.createElement('div'); d.className='media-item';
    var media; if(it.kind==='video'){ media=document.createElement('video'); media.src=it.url; media.muted=true; media.loop=true; media.autoplay=true; media.setAttribute('playsinline',''); } else { media=document.createElement('img'); media.src=it.url; } media.style.width='100%'; media.style.aspectRatio='9/16'; media.style.objectFit='cover'; media.style.background='#0C0E12'; d.appendChild(media);
    const body=document.createElement('div'); body.className='mi-body';
    if(it.kind==='video'){ const t=document.createElement('span'); t.className='vidtag'; t.textContent='ВІДЕО · '+(it.subcategory==='instagram'?'Instagram':'TikTok'); body.appendChild(t); const cap=document.createElement('span'); cap.textContent=it.caption||''; body.appendChild(cap); }
    else if(it.subcategory){ const t=document.createElement('span'); t.textContent='Підкатегорія: '+it.subcategory; body.appendChild(t); }
    const act=document.createElement('div'); act.className='mi-actions';
    const up=document.createElement('button'); up.className='ghost sm'; up.textContent='↑'; up.onclick=()=>move(it,data[i-1]); if(i===0)up.disabled=true;
    const dn=document.createElement('button'); dn.className='ghost sm'; dn.textContent='↓'; dn.onclick=()=>move(it,data[i+1]); if(i===data.length-1)dn.disabled=true;
    const del=document.createElement('button'); del.className='danger sm'; del.textContent='Видалити'; del.onclick=()=>delItem(it);
    act.appendChild(up); act.appendChild(dn); act.appendChild(del); body.appendChild(act);
    d.appendChild(body); list.appendChild(d);
  });
}

function renderSingleSlots(s, data, list){
  s.slots.forEach(function(slot){
    const key=slot[0], label=slot[1];
    const it = data.find(function(r){ return r.subcategory===key; });
    const d=document.createElement('div'); d.className='media-item';
    let media;
    if(it && it.kind==='video'){ media=document.createElement('video'); media.src=it.url; media.muted=true; media.loop=true; media.autoplay=true; media.setAttribute('playsinline',''); }
    else if(it){ media=document.createElement('img'); media.src=it.url; }
    else { media=document.createElement('div'); media.textContent='— порожньо —'; media.style.display='grid'; media.style.placeItems='center'; media.style.color='#6C7886'; media.style.fontSize='.8rem'; }
    media.style.width='100%'; media.style.aspectRatio='9/16'; media.style.objectFit='cover'; media.style.background='#0C0E12'; if(!it) media.style.background='#EAF3F8';
    d.appendChild(media);
    const body=document.createElement('div'); body.className='mi-body';
    const t=document.createElement('span'); t.style.fontWeight='700'; t.style.color='#0C0E12'; t.textContent=label; body.appendChild(t);
    if(it && it.kind==='video'){ const vt=document.createElement('span'); vt.className='vidtag'; vt.textContent='ВІДЕО'; body.appendChild(vt); }
    if(it){ const act=document.createElement('div'); act.className='mi-actions';
      const del=document.createElement('button'); del.className='danger sm'; del.textContent='Видалити'; del.onclick=()=>delItem(it);
      act.appendChild(del); body.appendChild(act); }
    d.appendChild(body); list.appendChild(d);
  });
}

async function addSingle(){
  const s=curSection(); const slot=$('#slotSel').value; const file=$('#slotFile').files[0];
  if(!file){ $('#mediaStatus').textContent='Оберіть файл'; return; }
  const isVideo = /^video\//.test(file.type);
  if(s.imageOnly && isVideo){ $('#mediaStatus').textContent='Сюди можна лише фото'; return; }
  if(s.videoOnly && !isVideo){ $('#mediaStatus').textContent='Сюди можна лише відео'; return; }
  $('#mediaStatus').textContent='Завантаження…';
  const path = s.id+'/'+slot+'_'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'');
  const up = await db.storage.from('media').upload(path, file, {upsert:false});
  if(up.error){ $('#mediaStatus').textContent='Помилка: '+up.error.message; return; }
  const url = db.storage.from('media').getPublicUrl(path).data.publicUrl;
  // прибрати попередній файл і запис у цьому слоті
  const { data:old } = await db.from('gallery').select('id,storage_path').eq('section',s.id).eq('subcategory',slot);
  if(old && old.length){ const paths=old.map(o=>o.storage_path).filter(Boolean); if(paths.length) await db.storage.from('media').remove(paths); await db.from('gallery').delete().eq('section',s.id).eq('subcategory',slot); }
  const pos = s.slots.findIndex(x=>x[0]===slot);
  const ins = await db.from('gallery').insert({ section:s.id, subcategory:slot, kind:isVideo?'video':'image', url, storage_path:path, position:pos });
  $('#mediaStatus').textContent = ins.error?('Помилка: '+ins.error.message):'Збережено ✓';
  setTimeout(()=>{$('#mediaStatus').textContent='';},2200);
  $('#slotFile').value='';
  renderMedia();
}

async function addPhotos(){
  const s=curSection(); const files=$('#photoInput').files; if(!files.length){return;}
  const sub = $('#subSel') ? $('#subSel').value : null;
  $('#mediaStatus').textContent='Завантаження…';
  const { data:maxRows } = await db.from('gallery').select('position').eq('section',s.id).order('position',{ascending:false}).limit(1);
  let pos = maxRows && maxRows.length ? maxRows[0].position+1 : 0;
  for(const file of files){
    const path = s.id+'/'+Date.now()+'_'+Math.random().toString(36).slice(2)+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'');
    const up = await db.storage.from('media').upload(path, file, {upsert:false});
    if(up.error){ $('#mediaStatus').textContent='Помилка: '+up.error.message; return; }
    const url = db.storage.from('media').getPublicUrl(path).data.publicUrl;
    await db.from('gallery').insert({ section:s.id, subcategory:sub||null, kind:'image', url, storage_path:path, position:pos++ });
  }
  $('#mediaStatus').textContent='Готово ✓'; setTimeout(()=>{$('#mediaStatus').textContent='';},2000);
  renderMedia();
}

async function addWorks(){
  const slot=$('#slotSel').value; const file=$('#vidFile').files[0]; const link=$('#vidLink').value.trim(); const cap=$('#vidCap').value.trim();
  if(!file){ $('#mediaStatus').textContent='Оберіть відеофайл'; return; }
  $('#mediaStatus').textContent='Завантаження…';
  const path='works/'+slot+'_'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'');
  const up=await db.storage.from('media').upload(path,file);
  if(up.error){ $('#mediaStatus').textContent='Помилка: '+up.error.message; return; }
  const url=db.storage.from('media').getPublicUrl(path).data.publicUrl;
  await db.from('gallery').delete().eq('section','works').eq('subcategory',slot);
  const ins=await db.from('gallery').insert({section:'works',subcategory:slot,kind:'video',url:url,link:link||null,caption:cap||null,position:slot==='tiktok'?0:1});
  $('#mediaStatus').textContent = ins.error?('Помилка: '+ins.error.message):'Збережено ✓';
  setTimeout(()=>{$('#mediaStatus').textContent='';},2500);
  renderMedia();
}
async function addVideo(){
  const s=curSection(); const url=$('#vidUrl').value.trim(); const cap=$('#vidCap').value.trim();
  if(!url){return;}
  const { data:maxRows } = await db.from('gallery').select('position').eq('section',s.id).order('position',{ascending:false}).limit(1);
  let pos = maxRows && maxRows.length ? maxRows[0].position+1 : 0;
  const { error } = await db.from('gallery').insert({ section:s.id, kind:'video', url, caption:cap||null, position:pos });
  $('#mediaStatus').textContent = error? ('Помилка: '+error.message):'Додано ✓'; setTimeout(()=>{$('#mediaStatus').textContent='';},2000);
  renderMedia();
}

async function delItem(it){
  if(!confirm('Видалити цей елемент?'))return;
  if(it.storage_path){ await db.storage.from('media').remove([it.storage_path]); }
  await db.from('gallery').delete().eq('id', it.id);
  renderMedia();
}
async function move(a,b){
  if(!b)return;
  await db.from('gallery').update({position:b.position}).eq('id',a.id);
  await db.from('gallery').update({position:a.position}).eq('id',b.id);
  renderMedia();
}

$('#changePass').onclick = async function(){
  const p=$('#newPass').value; if(p.length<6){ $('#passStatus').textContent='Мінімум 6 символів'; return; }
  const { error } = await sb.auth.updateUser({ password:p });
  $('#passStatus').textContent = error? ('Помилка: '+error.message):'Пароль змінено ✓';
  $('#newPass').value='';
};

/* ---------- ЗАЯВКИ ---------- */
let LEADS=[];
function escL(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(iso){var d=new Date(iso);var p=function(n){return String(n).padStart(2,'0');};return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());}
async function loadLeads(){
  $('#leadsList').innerHTML='Завантаження…';
  const r = await db.from('leads').select('*').order('created_at',{ascending:false});
  if(r.error){ $('#leadsList').innerHTML='<div class="hint">Помилка: '+r.error.message+'</div>'; return; }
  LEADS=r.data||[];
  if(!LEADS.length){ $('#leadsList').innerHTML='<div class="hint">Поки що немає заявок.</div>'; return; }
  var th='style="text-align:left;padding:.55rem;border-bottom:2px solid var(--border)"';
  var td='style="padding:.55rem;border-bottom:1px solid var(--border)"';
  var h='<table style="width:100%;border-collapse:collapse;font-size:.92rem"><thead><tr><th '+th+'>Дата</th><th '+th+'>Імʼя</th><th '+th+'>Телефон</th><th '+th+'>Коментар</th><th '+th+'></th></tr></thead><tbody>';
  LEADS.forEach(function(x){
    h+='<tr><td '+td+'>'+fmtDate(x.created_at)+'</td><td '+td+'>'+escL(x.name)+'</td><td '+td+'>'+escL(x.phone)+'</td><td '+td+'>'+escL(x.comment||'')+'</td><td '+td+' align="right"><button class="danger sm" data-del="'+x.id+'">✕</button></td></tr>';
  });
  h+='</tbody></table>';
  $('#leadsList').innerHTML=h;
  $('#leadsList').querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(){ delLead(b.getAttribute('data-del')); }; });
}
async function delLead(id){ if(!confirm('Видалити цю заявку?'))return; await db.from('leads').delete().eq('id',id); loadLeads(); }
function exportLeads(){
  if(!LEADS.length){ $('#leadsStatus').textContent='Немає заявок для експорту'; setTimeout(function(){$('#leadsStatus').textContent='';},2000); return; }
  var rows=[['Дата','Імʼя','Телефон','Коментар']];
  LEADS.forEach(function(x){ rows.push([fmtDate(x.created_at), x.name, x.phone, x.comment||'']); });
  var ws=XLSX.utils.aoa_to_sheet(rows); ws['!cols']=[{wch:18},{wch:24},{wch:20},{wch:40}];
  var wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Заявки');
  XLSX.writeFile(wb,'zayavky.xlsx');
}
var _expBtn=document.getElementById('exportLeads'); if(_expBtn) _expBtn.onclick=exportLeads;

init();
</script>
